services:
  codepilot-server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: codepilot-agent-server:0.1.0
    container_name: codepilot-server
    ports:
      - "8080:8080"
    volumes:
      - ../../storage:/data
      - ../../workspace:/workspace
      - ../../config:/app/config:ro
    environment:
      AGENT_ENV: production
      LLM_API_KEY: ${LLM_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  codepilot-web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    image: codepilot-web:0.2.0
    container_name: codepilot-web
    depends_on:
      codepilot-server:
        condition: service_healthy
    ports:
      - "8081:80"
    restart: unless-stopped

  codepilot-tui:
    image: codepilot-agent-server:0.1.0
    profiles:
      - tui
    depends_on:
      codepilot-server:
        condition: service_healthy
    command: ["/app/codepilot-tui-client"]
