name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'               # 推送 tag 时自动构建正式版

  workflow_dispatch:         # 手动触发，组员可在 GitHub Actions 页面点击构建任意分支
    inputs:
      version:
        description: 'Version override (optional, e.g. 0.2.0)'
        required: false
        default: ''
      ref:
        description: 'Branch or tag to build (default: main)'
        required: false
        default: 'main'

permissions:
  contents: read
  actions: write

jobs:
  package:
    name: Package Windows Installer
    runs-on: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0    # 完整历史用于 git describe

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/new-web/package-lock.json

      - name: Install Inno Setup 6
        shell: cmd
        run: |
          curl -fsSL -o "%TEMP%\innosetup.exe" https://jrsoftware.org/download.php/is.exe
          "%TEMP%\innosetup.exe" /VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-
          del "%TEMP%\innosetup.exe"
          timeout /t 5 /nobreak >nul

      - name: Build installer (via package.bat)
        shell: cmd
        run: |
          set "VER=${{ github.event.inputs.version }}"
          set "TAG=${{ github.ref_name }}"
          set "TAG=%TAG:v=%"
          if not "%VER%"=="" (
            call scripts\package.bat -version "%VER%"
          ) else (
            echo %TAG% | findstr /r "^[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*" >nul
            if %ERRORLEVEL% equ 0 (
              call scripts\package.bat -version "%TAG%"
            ) else (
              call scripts\package.bat
            )
          )

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodePilot-Setup
          path: dist/CodePilot-Setup-*.exe
          retention-days: 90
          compression-level: 0

      - name: Upload staging directory (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-staging-debug
          path: build/staging/
          retention-days: 7